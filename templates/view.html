<!DOCTYPE html>
<html>
<head>
    <title>View Transactions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>📄 All Transactions</h1>

<table border="1" cellpadding="10" style="margin:auto; background:white;">
    <tr style="background:#4CAF50; color:white;">
        <th>ID</th>
        <th>Amount</th>
        <th>Category</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>₹ {{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>
            <a href="/delete/{{ row[0] }}" style="color:red;">Delete</a> |
            <a href="/edit/{{ row[0] }}" style="color:green;">Edit</a>
        </td>
    </tr>
    {% endfor %}

</table>

<br><br>

<a href="/">⬅ Back to Home</a>

</body>
</html>
